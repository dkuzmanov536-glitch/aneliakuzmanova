<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a3a25">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Градина">
  <title>Моята градина 🍅</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🍅%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0d1f15; min-height: 100vh; display: flex; justify-content: center; overscroll-behavior: none; }
    .app { width: 100%; max-width: 390px; min-height: 100vh; background: #f5f0e8; display: flex; flex-direction: column; }
    @media (min-width: 391px) { .app { border-radius: 24px; margin: 20px auto; min-height: calc(100vh - 40px); box-shadow: 0 20px 80px rgba(0,0,0,0.4); } }
    .header { background: linear-gradient(170deg, #1a3a25 0%, #2d5a3d 100%); padding: 48px 20px 22px; position: relative; overflow: hidden; }
    .header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.03); }
    .header-top { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: flex-start; }
    .greeting { color: #6ee7a0; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .title { color: #f5f0e8; font-family: 'Fraunces', serif; font-size: 26px; font-weight: 400; line-height: 1.1; }
    .weather-box { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 10px 14px; text-align: center; }
    .weather-box div { color: #fff; font-size: 15px; font-weight: 500; }
    .weather-box span { color: #6ee7a0; font-size: 10px; display: block; }
    .stats-row { display: flex; gap: 10px; margin-top: 16px; position: relative; z-index: 1; }
    .stat-box { flex: 1; background: rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 14px; }
    .stat-box small { color: #6ee7a0; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 2px; }
    .stat-box b { color: #fff; font-family: 'Fraunces', serif; font-size: 22px; font-weight: 400; }
    .sync-badge { position: absolute; top: 48px; left: 20px; background: rgba(110, 231, 160, 0.15); border: 1px solid rgba(110, 231, 160, 0.3); border-radius: 20px; padding: 3px 10px; display: flex; align-items: center; gap: 5px; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #6ee7a0; }
    .sync-dot.syncing { animation: pulse 1s infinite; }
    .sync-text { color: #6ee7a0; font-size: 10px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .tabs { background: #1a3a25; display: flex; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .tab { flex: 1; background: none; border: none; cursor: pointer; padding: 10px 2px; font-size: 11px; color: #4a7a5a; font-weight: 400; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #6ee7a0; font-weight: 500; border-bottom-color: #6ee7a0; }
    .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 40px; }
    .content::-webkit-scrollbar { display: none; }
    .section-title { font-family: 'Fraunces', serif; font-size: 15px; color: #2d3a2e; margin-bottom: 12px; font-weight: 500; }
    .plant-card { background: #fff; border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; animation: fadeIn 0.4s ease both; }
    .plant-emoji { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .plant-info { flex: 1; min-width: 0; }
    .plant-name { font-family: 'Fraunces', serif; font-size: 15px; color: #1a2e1e; }
    .plant-details { font-size: 12px; color: #7a9a7e; margin-top: 1px; }
    .plant-badge { display: inline-block; margin-top: 5px; border-radius: 8px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
    .water-btn { background: #1a3a25; border: none; border-radius: 12px; padding: 8px 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; transition: transform 0.1s; }
    .water-btn:active { transform: scale(0.93); }
    .water-btn span { font-size: 18px; }
    .water-btn small { font-size: 10px; color: #6ee7a0; }
    .delete-btn { background: #fee2e2; border: none; border-radius: 10px; padding: 8px; cursor: pointer; flex-shrink: 0; font-size: 16px; }
    .empty-state { text-align: center; padding: 40px 16px; background: #fff; border-radius: 16px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 10px; }
    .empty-state h3 { font-family: 'Fraunces', serif; font-size: 18px; color: #2d5a3d; margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: #9aaa9e; }
    .add-btn { width: 100%; background: #2d5a3d; border: 2px dashed rgba(110,231,160,0.25); border-radius: 16px; padding: 16px; cursor: pointer; font-size: 14px; color: #6ee7a0; margin-top: 8px; }
    .forecast-grid { display: flex; gap: 8px; margin-bottom: 16px; }
    .fday { flex: 1; background: #fff; border-radius: 12px; padding: 10px 4px; text-align: center; border: 1px solid #e8e0d5; }
    .fday.rain { background: #e8f4fd; border-color: #93c5fd; }
    .fday-label { font-size: 10px; color: #7a9a7e; font-weight: 500; }
    .fday-icon { font-size: 18px; margin: 4px 0 2px; }
    .fday-temp { font-size: 12px; color: #2d3a2e; font-weight: 500; }
    .fday-rain { font-size: 10px; color: #3b82f6; }
    .rain-alert { background: #eff6ff; border-radius: 12px; padding: 10px 14px; border: 1px solid #bfdbfe; display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .rain-alert span { font-size: 12px; color: #1d4ed8; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 100; animation: fadeIn 0.2s; }
    .modal { background: #f5f0e8; border-radius: 24px 24px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 390px; animation: slideUp 0.35s cubic-bezier(.32,.72,0,1); }
    .modal h2 { font-family: 'Fraunces', serif; font-size: 18px; color: #1a2e1e; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 12px; color: #52796f; display: block; margin-bottom: 4px; }
    .form-input { width: 100%; background: #fff; border: 1px solid #d4e8da; border-radius: 10px; padding: 10px 12px; font-size: 14px; color: #1a2e1e; outline: none; font-family: 'DM Sans', sans-serif; }
    .form-row { display: flex; gap: 10px; }
    .submit-btn { width: 100%; background: #1a3a25; border: none; border-radius: 14px; padding: 14px; cursor: pointer; font-size: 15px; color: #6ee7a0; font-weight: 500; margin-top: 4px; }
    /* AI Tab */
    .ai-header { background: linear-gradient(135deg, #1a3a25, #2d5a3d); border-radius: 16px; padding: 20px; margin-bottom: 16px; color: #fff; }
    .ai-header h2 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 400; margin-bottom: 6px; }
    .ai-header p { font-size: 13px; color: #6ee7a0; }
    .ai-options { display: flex; gap: 10px; margin-bottom: 16px; }
    .ai-option { flex: 1; background: #fff; border: 2px solid #e8e0d5; border-radius: 14px; padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .ai-option.selected { border-color: #2d5a3d; background: #f0fdf4; }
    .ai-option .opt-icon { font-size: 28px; margin-bottom: 6px; }
    .ai-option .opt-label { font-size: 12px; color: #2d3a2e; font-weight: 500; }
    .upload-zone { background: #fff; border: 2px dashed #d4e8da; border-radius: 16px; padding: 30px; text-align: center; cursor: pointer; margin-bottom: 16px; transition: all 0.2s; }
    .upload-zone:hover { border-color: #2d5a3d; background: #f0fdf4; }
    .upload-zone input { display: none; }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .upload-text { font-size: 14px; color: #52796f; }
    .upload-sub { font-size: 12px; color: #9aaa9e; margin-top: 4px; }
    .preview-img { width: 100%; border-radius: 12px; margin-bottom: 16px; max-height: 250px; object-fit: cover; }
    .analyze-btn { width: 100%; background: #1a3a25; border: none; border-radius: 14px; padding: 14px; cursor: pointer; font-size: 15px; color: #6ee7a0; font-weight: 500; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .analyze-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .ai-result { background: #fff; border-radius: 16px; padding: 16px; border: 1px solid #d4e8da; }
    .ai-result-title { font-family: 'Fraunces', serif; font-size: 15px; color: #2d5a3d; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .ai-result-text { font-size: 13px; color: #2d3a2e; line-height: 1.7; white-space: pre-wrap; }
    .loading-dots { display: inline-flex; gap: 4px; }
    .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: #6ee7a0; animation: bounce 0.8s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .hidden { display: none !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a3a25; color: #6ee7a0; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; animation: fadeIn 0.3s; }
    .setup-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .setup-box h3 { font-family: 'Fraunces', serif; font-size: 15px; color: #856404; margin-bottom: 8px; }
    .setup-box p { font-size: 12px; color: #856404; margin-bottom: 8px; }
    .setup-box code { background: #fff8e1; border-radius: 6px; padding: 8px; display: block; font-size: 11px; color: #333; white-space: pre; overflow-x: auto; }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="sync-badge" id="syncBadge">
      <div class="sync-dot" id="syncDot"></div>
      <span class="sync-text" id="syncText">Облак</span>
    </div>
    <div class="header-top" style="margin-top: 20px;">
      <div>
        <div class="greeting">Добро утро</div>
        <div class="title">Моята<br/>градина</div>
      </div>
      <div class="weather-box">
        <div style="font-size: 22px;">☀️</div>
        <div>22°C</div>
        <span>Дъжд Пет</span>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box">
        <small>За поливане днес</small>
        <b id="todayCount">0</b>
      </div>
      <div class="stat-box">
        <small>Общо вода</small>
        <b id="todayWater">0.0 л</b>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)">Начало</button>
    <button class="tab" onclick="switchTab(1)">Растения</button>
    <button class="tab" onclick="switchTab(2)">Разписание</button>
    <button class="tab" onclick="switchTab(3)">История</button>
    <button class="tab" onclick="switchTab(4)">AI 🤖</button>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div style="text-align:center;padding:40px;color:#7a9a7e;font-size:14px;">Зарежда...</div>
  </div>
</div>

<!-- Add Plant Modal -->
<div id="modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Ново растение</h2>
    <div class="form-group">
      <label>Emoji</label>
      <input class="form-input" id="newEmoji" placeholder="🌱" maxlength="2">
    </div>
    <div class="form-group">
      <label>Наименование</label>
      <input class="form-input" id="newName" placeholder="напр. Домати">
    </div>
    <div class="form-group">
      <label>Зона / Местоположение</label>
      <input class="form-input" id="newZone" placeholder="напр. Зона А">
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label>Поливане (дни)</label>
        <input type="number" class="form-input" id="newInterval" min="1" max="14" value="2">
      </div>
      <div class="form-group" style="flex:1">
        <label>Вода (литри)</label>
        <input type="number" class="form-input" id="newAmount" min="0.1" max="20" step="0.5" value="1">
      </div>
    </div>
    <button class="submit-btn" onclick="addPlant()">Добави растение</button>
  </div>
</div>

<script>
  // ==================== CONFIG ====================
  const SUPABASE_URL = 'https://evshwxvecvtncaruzgfl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2c2h3eHZlY3Z0bmNhcnp1Z2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTU3NDQsImV4cCI6MjA5NjMzMTc0NH0.Mg7h4yOaCFACR4vuOvbo1Kw7i6U5BN6GKGmYezJ8gR0';
  const REPLICATE_TOKEN = 'REPLICATE_TOKEN_HERE'; // Замени с твоя токен от replicate.com

  // Tab hash mapping
  const TAB_HASHES = ['#home', '#plants', '#schedule', '#history', '#ai'];
  const HASH_TO_TAB = { '#home': 0, '#plants': 1, '#schedule': 2, '#history': 3, '#ai': 4 };

  // ==================== STATE ====================
  let currentTab = 0;
  let plants = [];
  let historyData = [];
  let dbReady = false;
  let selectedAnalysisType = 'storm';
  let uploadedImageBase64 = null;
  let aiResultHtml = null;

  const forecast = [
    { day: "Сря", icon: "☀️", temp: 22, rain: 0 },
    { day: "Чет", icon: "⛅", temp: 20, rain: 0 },
    { day: "Пет", icon: "🌧️", temp: 17, rain: 12 },
    { day: "Съб", icon: "🌦️", temp: 18, rain: 5 },
    { day: "Нед", icon: "☀️", temp: 23, rain: 0 },
  ];

  const statusColors = {
    overdue: { dot: "#ef4444", bg: "#fef2f2", text: "#b91c1c", label: "Полей сега!", border: "#ef444422" },
    today:   { dot: "#f97316", bg: "#fff7ed", text: "#c2410c", label: "Днес",        border: "#f9731622" },
    soon:    { dot: "#eab308", bg: "#fefce8", text: "#a16207", label: "Скоро",       border: "#eab30822" },
    ok:      { dot: "#22c55e", bg: "#f0fdf4", text: "#15803d", label: "Добре",       border: "#22c55e22" },
  };

  // ==================== SUPABASE ====================
  async function dbFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...options,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...(options.headers || {})
      }
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function loadFromDB() {
    setSyncState('syncing', 'Зарежда...');
    try {
      const [p, h] = await Promise.all([
        dbFetch('plants?select=*&order=created_at.asc'),
        dbFetch('history?select=*&order=watered_at.desc&limit=50')
      ]);
      plants = (p || []).map(row => ({
        id: row.id,
        name: row.name,
        emoji: row.emoji || '🌱',
        zone: row.zone || '',
        intervalDays: row.interval_days,
        lastWatered: row.last_watered,
        amountL: parseFloat(row.amount_l),
        durationMin: row.duration_min,
        notes: row.notes || ''
      }));
      historyData = (h || []).map(row => ({
        id: row.id,
        plant: row.plant_name,
        emoji: row.emoji || '🌱',
        amount: parseFloat(row.amount),
        time: new Date(row.watered_at)
      }));
      dbReady = true;
      setSyncState('online', 'Облак ✓');
    } catch (e) {
      console.error('DB error:', e);
      setSyncState('offline', 'Грешка!');
      dbReady = false;
    }
    updateStats();
    render();
  }

  async function addPlantToDB(plant) {
    return await dbFetch('plants', {
      method: 'POST',
      body: JSON.stringify({
        name: plant.name,
        emoji: plant.emoji,
        zone: plant.zone,
        interval_days: plant.intervalDays,
        last_watered: plant.lastWatered,
        amount_l: plant.amountL,
        duration_min: plant.durationMin,
        notes: plant.notes
      })
    });
  }

  async function waterPlantInDB(id, lastWatered, plantName, emoji, amount) {
    await Promise.all([
      dbFetch(`plants?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ last_watered: lastWatered })
      }),
      dbFetch('history', {
        method: 'POST',
        body: JSON.stringify({
          plant_name: plantName,
          emoji: emoji,
          amount: amount,
          watered_at: new Date().toISOString()
        })
      })
    ]);
  }

  async function deletePlantFromDB(id) {
    await dbFetch(`plants?id=eq.${id}`, { method: 'DELETE' });
  }

  // ==================== SYNC STATE ====================
  function setSyncState(state, text) {
    const dot = document.getElementById('syncDot');
    const txt = document.getElementById('syncText');
    if (!dot || !txt) return;
    dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : '');
    dot.style.background = state === 'offline' ? '#ef4444' : '#6ee7a0';
    txt.textContent = text;
  }

  // ==================== PLANT LOGIC ====================
  function daysUntilNext(plant) {
    return (plant.lastWatered + plant.intervalDays * 86400000 - Date.now()) / 86400000;
  }

  function statusOf(plant) {
    const d = daysUntilNext(plant);
    if (d < 0) return "overdue";
    if (d < 1) return "today";
    if (d < 2) return "soon";
    return "ok";
  }

  function nextWaterLabel(plant) {
    const d = daysUntilNext(plant);
    if (d < 0) return "Сега!";
    if (d < 0.5) return "Днес";
    if (d < 1.5) return "Утре";
    return ["Нед","Пон","Вт","Ср","Чет","Пет","Съб"][new Date(plant.lastWatered + plant.intervalDays * 86400000).getDay()];
  }

  function updateStats() {
    const todayList = plants.filter(p => daysUntilNext(p) < 1);
    const totalWater = todayList.reduce((s, p) => s + p.amountL, 0);
    document.getElementById('todayCount').textContent = todayList.length;
    document.getElementById('todayWater').textContent = totalWater.toFixed(1) + ' л';
  }

  async function waterPlant(id) {
    const plant = plants.find(p => p.id === id);
    if (!plant) return;
    const now = Date.now();
    plant.lastWatered = now;
    historyData.unshift({ id: Date.now(), plant: plant.name, emoji: plant.emoji, amount: plant.amountL, time: new Date() });
    updateStats();
    render();
    showToast('💧 ' + plant.name + ' е полято!');
    try {
      setSyncState('syncing', 'Запазва...');
      await waterPlantInDB(id, now, plant.name, plant.emoji, plant.amountL);
      setSyncState('online', 'Облак ✓');
    } catch(e) {
      setSyncState('offline', 'Грешка!');
    }
  }

  async function deletePlant(id) {
    plants = plants.filter(p => p.id !== id);
    updateStats();
    render();
    try {
      setSyncState('syncing', 'Изтрива...');
      await deletePlantFromDB(id);
      setSyncState('online', 'Облак ✓');
    } catch(e) {
      setSyncState('offline', 'Грешка!');
    }
  }

  function showModal() { document.getElementById('modal').classList.remove('hidden'); }
  function closeModal() { document.getElementById('modal').classList.add('hidden'); }

  async function addPlant() {
    const name = document.getElementById('newName').value.trim();
    if (!name) return;
    const plant = {
      name,
      emoji: document.getElementById('newEmoji').value || '🌱',
      zone: document.getElementById('newZone').value,
      intervalDays: +document.getElementById('newInterval').value,
      lastWatered: Date.now() - +document.getElementById('newInterval').value * 86400000,
      amountL: +document.getElementById('newAmount').value,
      durationMin: 10,
      notes: ''
    };
    closeModal();
    setSyncState('syncing', 'Запазва...');
    try {
      const res = await addPlantToDB(plant);
      plant.id = res[0].id;
      plants.push(plant);
      setSyncState('online', 'Облак ✓');
      showToast('🌱 ' + plant.name + ' добавено!');
    } catch(e) {
      setSyncState('offline', 'Грешка!');
    }
    document.getElementById('newName').value = '';
    document.getElementById('newEmoji').value = '';
    document.getElementById('newZone').value = '';
    document.getElementById('newInterval').value = '2';
    document.getElementById('newAmount').value = '1';
    updateStats();
    render();
  }

  // ==================== REPLICATE AI ====================
  async function analyzeWithAI() {
    if (!uploadedImageBase64) { showToast('⚠️ Качи снимка първо!'); return; }

    const btn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('aiResult');
    btn.disabled = true;
    btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
    aiResultHtml = null;

    const prompt = selectedAnalysisType === 'storm'
      ? 'You are a plant expert. Analyze this image of storm/hail damage to a garden. Describe: 1) What damage you see, 2) Which plants are affected, 3) A step-by-step recovery plan. Be specific and practical. Answer in Bulgarian language.'
      : 'You are a plant expert. Analyze this damaged plant in the image. Describe: 1) What type of damage or disease you see, 2) What caused it, 3) A detailed recovery plan with specific steps. Answer in Bulgarian language.';

    try {
      const createRes = await fetch('https://api.replicate.com/v1/predictions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${REPLICATE_TOKEN}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          version: 'yorickvp/llava-13b:b5f6212d032508382d61ff00469ddda3e32fd8a0be63b04af551f8db0dec4ad4',
          input: {
            image: `data:image/jpeg;base64,${uploadedImageBase64}`,
            prompt: prompt,
            max_tokens: 1024
          }
        })
      });

      const prediction = await createRes.json();
      if (!prediction.id) throw new Error('Не може да се стартира анализа');

      let result = prediction;
      let attempts = 0;
      while (result.status !== 'succeeded' && result.status !== 'failed' && attempts < 60) {
        await new Promise(r => setTimeout(r, 2000));
        const pollRes = await fetch(`https://api.replicate.com/v1/predictions/${result.id}`, {
          headers: { 'Authorization': `Bearer ${REPLICATE_TOKEN}` }
        });
        result = await pollRes.json();
        attempts++;
        btn.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div> ${attempts*2}с`;
      }

      const text = result.status === 'succeeded'
        ? (Array.isArray(result.output) ? result.output.join('') : result.output)
        : 'Анализата не успя. Опитай отново.';

      aiResultHtml = `
        <div class="ai-result-title">🤖 AI Анализ и План</div>
        <div class="ai-result-text">${text}</div>
      `;

    } catch(e) {
      console.error(e);
      aiResultHtml = `
        <div class="ai-result-title">⚠️ Грешка при анализа</div>
        <div class="ai-result-text">Не може да се свърже с AI сервиса. Провери интернет връзката и опитай отново.\n\nДетайли: ${e.message}</div>
      `;
    }

    resultDiv.innerHTML = aiResultHtml;
    resultDiv.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '🤖 Анализирай и дай план';
  }

  function handleImageUpload(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      uploadedImageBase64 = base64;
      aiResultHtml = null;
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('previewImg').style.display = 'block';
      document.getElementById('uploadZoneContent').style.display = 'none';
      document.getElementById('analyzeBtn').disabled = false;
      const resultDiv = document.getElementById('aiResult');
      if (resultDiv) resultDiv.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // ==================== TOAST ====================
  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ==================== TABS ====================
  function switchTab(index) {
    currentTab = index;
    history.replaceState(null, '', TAB_HASHES[index]);
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
    render();
  }

  // ==================== RENDER ====================
  function render() {
    const content = document.getElementById('content');

    if (!dbReady && currentTab !== 4) {
      content.innerHTML = `
        <div class="setup-box">
          <h3>⚙️ Настройка на базата данни</h3>
          <p>Трябва да създадеш таблиците в Supabase. Отвори SQL Editor в Supabase и изпълни:</p>
          <code>create table plants (
  id bigserial primary key,
  name text not null,
  emoji text default '🌱',
  zone text default '',
  interval_days integer default 2,
  last_watered bigint,
  amount_l decimal(4,1) default 1,
  duration_min integer default 10,
  notes text default '',
  created_at timestamptz default now()
);
create table history (
  id bigserial primary key,
  plant_name text not null,
  emoji text default '🌱',
  amount decimal(4,1) default 1,
  watered_at timestamptz default now()
);
alter table plants disable row level security;
alter table history disable row level security;</code>
          <br>
          <button class="submit-btn" onclick="loadFromDB()" style="margin-top: 8px;">Опитай пак</button>
        </div>
      `;
      return;
    }

    if (currentTab === 0) renderHome(content);
    else if (currentTab === 1) renderPlants(content);
    else if (currentTab === 2) renderSchedule(content);
    else if (currentTab === 3) renderHistory(content);
    else if (currentTab === 4) renderAI(content);
  }

  function renderHome(content) {
    const sorted = [...plants].sort((a, b) => daysUntilNext(a) - daysUntilNext(b));
    const needWater = sorted.filter(p => statusOf(p) !== "ok");
    let html = '';

    html += '<div class="section-title">Прогноза за дъжд</div>';
    html += '<div class="forecast-grid">';
    forecast.forEach(f => {
      html += `<div class="fday ${f.rain > 0 ? 'rain' : ''}">
        <div class="fday-label">${f.day}</div>
        <div class="fday-icon">${f.icon}</div>
        <div class="fday-temp">${f.temp}°</div>
        ${f.rain > 0 ? `<div class="fday-rain">${f.rain}мм</div>` : ''}
      </div>`;
    });
    html += '</div>';

    if (forecast.some(f => f.rain > 0)) {
      html += `<div class="rain-alert">🌧️ <span>Дъжд в петък — поливането ще се пропусне</span></div>`;
    }

    html += '<div class="section-title">Нужда от вода</div>';

    if (plants.length === 0) {
      html += `<div class="empty-state">
        <div class="icon">🌱</div>
        <h3>Все още няма растения</h3>
        <p>Добави първото си растение</p>
      </div>`;
    } else if (needWater.length === 0) {
      html += `<div class="empty-state">
        <div class="icon">🌿</div>
        <h3>Всички са поляти!</h3>
        <p>Нищо за правене днес 🎉</p>
      </div>`;
    } else {
      needWater.forEach(p => {
        const sc = statusColors[statusOf(p)];
        html += `<div class="plant-card" style="border: 1px solid ${sc.border}">
          <div class="plant-emoji" style="background:${sc.bg}">${p.emoji}</div>
          <div class="plant-info">
            <div class="plant-name">${p.name}</div>
            <div class="plant-details">${p.zone} · ${p.amountL}л · ${p.durationMin}мин</div>
            <div class="plant-badge" style="background:${sc.bg};color:${sc.text}">${sc.label}</div>
          </div>
          <button class="water-btn" onclick="waterPlant(${p.id})">
            <span>💧</span><small>Полей</small>
          </button>
        </div>`;
      });
    }
    content.innerHTML = html;
  }

  function renderPlants(content) {
    let html = '';
    plants.forEach(p => {
      const sc = statusColors[statusOf(p)];
      html += `<div class="plant-card" style="border:1px solid #e8e0d5">
        <div class="plant-emoji" style="background:${sc.bg}">${p.emoji}</div>
        <div class="plant-info">
          <div class="plant-name">${p.name}</div>
          <div class="plant-details">${p.zone} · на ${p.intervalDays} дни · ${p.amountL}л</div>
          <div class="plant-badge" style="background:${sc.bg};color:${sc.text}">${nextWaterLabel(p)}</div>
        </div>
        <button class="water-btn" onclick="waterPlant(${p.id})" style="margin-right:6px">
          <span>💧</span>
        </button>
        <button class="delete-btn" onclick="if(confirm('Изтрий ${p.name}?'))deletePlant(${p.id})">🗑️</button>
      </div>`;
    });
    html += `<button class="add-btn" onclick="showModal()">+ Добави растение</button>`;
    content.innerHTML = html;
  }

  function renderSchedule(content) {
    const todayList = plants.filter(p => daysUntilNext(p) < 1);
    const upcoming = plants.filter(p => daysUntilNext(p) >= 1).sort((a, b) => daysUntilNext(a) - daysUntilNext(b));
    let html = '<div class="section-title">Днес</div>';

    if (todayList.length === 0) {
      html += `<div class="empty-state"><div class="icon">✅</div><h3>Нищо за поливане</h3></div>`;
    } else {
      todayList.forEach(p => {
        const sc = statusColors[statusOf(p)];
        html += `<div class="plant-card" style="border:1px solid #e8e0d5">
          <div class="plant-emoji" style="background:${sc.bg}">${p.emoji}</div>
          <div class="plant-info">
            <div class="plant-name">${p.name}</div>
            <div class="plant-details">${p.zone} · ${p.amountL}л · ${p.durationMin}мин</div>
          </div>
          <button class="water-btn" onclick="waterPlant(${p.id})"><span>💧</span></button>
        </div>`;
      });
    }

    if (upcoming.length > 0) {
      html += '<div class="section-title" style="margin-top:20px">Предстоящо</div>';
      upcoming.forEach(p => {
        html += `<div class="plant-card" style="border:1px solid #e8e0d5;opacity:0.7">
          <div class="plant-emoji" style="background:#f5f0e8">${p.emoji}</div>
          <div class="plant-info">
            <div class="plant-name">${p.name}</div>
            <div class="plant-details">${p.zone}</div>
          </div>
          <div style="font-size:12px;color:#7a9a7e">${nextWaterLabel(p)}</div>
        </div>`;
      });
    }
    content.innerHTML = html;
  }

  function renderHistory(content) {
    if (historyData.length === 0) {
      content.innerHTML = `<div class="empty-state"><div class="icon">📋</div><h3>Историята е празна</h3><p>Полей растение, за да видиш запис тук</p></div>`;
      return;
    }
    let html = '<div class="section-title">Последни поливания</div>';
    historyData.forEach(h => {
      const time = new Date(h.time);
      html += `<div class="plant-card" style="border:1px solid #e8e0d5">
        <div class="plant-emoji" style="background:#e8f5ec">${h.emoji}</div>
        <div class="plant-info">
          <div class="plant-name">${h.plant}</div>
          <div class="plant-details">${time.toLocaleDateString('bg-BG')} ${time.toLocaleTimeString('bg-BG',{hour:'2-digit',minute:'2-digit'})} · ${h.amount}л</div>
        </div>
        <div style="background:#f0fdf4;border-radius:8px;padding:3px 8px;font-size:11px;color:#15803d">✓</div>
      </div>`;
    });
    const total = historyData.reduce((s, h) => s + h.amount, 0);
    html += `<div style="text-align:center;margin-top:16px">
      <div style="font-size:12px;color:#7a9a7e">Общо използвана вода:</div>
      <div style="font-family:'Fraunces',serif;font-size:28px;color:#2d5a3d;margin-top:4px">${total.toFixed(1)} л</div>
    </div>`;
    content.innerHTML = html;
  }

  function renderAI(content) {
    content.innerHTML = `
      <div class="ai-header">
        <h2>🤖 AI Помощник</h2>
        <p>Качи снимка на буря или повредено растение и получи план за възстановяване</p>
      </div>

      <div class="section-title">Какво искаш да анализираш?</div>
      <div class="ai-options">
        <div class="ai-option ${selectedAnalysisType === 'storm' ? 'selected' : ''}" onclick="selectAnalysisType('storm')">
          <div class="opt-icon">⛈️</div>
          <div class="opt-label">Щети от буря/градушка</div>
        </div>
        <div class="ai-option ${selectedAnalysisType === 'plant' ? 'selected' : ''}" onclick="selectAnalysisType('plant')">
          <div class="opt-icon">🪴</div>
          <div class="opt-label">Повредено растение</div>
        </div>
      </div>

      <div class="section-title">Качи снимка</div>
      <div class="upload-zone" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" capture="environment">
        <div id="uploadZoneContent" ${uploadedImageBase64 ? 'style="display:none"' : ''}>
          <div class="upload-icon">📸</div>
          <div class="upload-text">Кликни за да качиш снимка</div>
          <div class="upload-sub">или направи снимка с камерата</div>
        </div>
        <img id="previewImg" class="preview-img"
          src="${uploadedImageBase64 ? 'data:image/jpeg;base64,' + uploadedImageBase64 : ''}"
          style="display:${uploadedImageBase64 ? 'block' : 'none'}">
      </div>

      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeWithAI()" ${uploadedImageBase64 ? '' : 'disabled'}>
        🤖 Анализирай и дай план
      </button>

      <div class="ai-result" id="aiResult" style="display:${aiResultHtml ? 'block' : 'none'}">
        ${aiResultHtml || ''}
      </div>
    `;

    document.getElementById('imageInput').addEventListener('change', (e) => {
      handleImageUpload(e.target.files[0]);
    });

    const zone = document.querySelector('.upload-zone');
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.style.borderColor = '#2d5a3d'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = '#d4e8da'; });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.style.borderColor = '#d4e8da';
      handleImageUpload(e.dataTransfer.files[0]);
    });
  }

  function selectAnalysisType(type) {
    selectedAnalysisType = type;
    render();
  }

  // ==================== INIT ====================
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }

  // FIX: Open correct tab from URL hash (e.g. site.com/#ai opens AI tab)
  (function() {
    const hash = window.location.hash.toLowerCase();
    const idx = HASH_TO_TAB[hash];
    if (idx !== undefined) {
      currentTab = idx;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
    }
  })();

  loadFromDB();
</script>
</body>
</html>
